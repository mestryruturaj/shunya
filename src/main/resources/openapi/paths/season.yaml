season:
  post:
    tags:
      - SeasonManagement
    operationId: createSeason
    summary: Create a new season
    description: Create a new season with specified details
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components.yaml#/components/schemas/SeasonCreateRequest'
    responses:
      '201':
        description: Season created successfully
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/SeasonResponse'
      '400':
        $ref: '../components.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '500':
        $ref: '../components.yaml#/components/responses/InternalServerError'

seasonById:
  get:
    tags:
      - SeasonManagement
    operationId: getSeasonById
    summary: Get season by Id
    description: Retrieve a season's details by its unique identifier
    parameters:
      - $ref: '#/components/parameters/season-id'
    responses:
      '200':
        description: Season details retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/SeasonResponse'
      '400':
        $ref: '../components.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '500':
        $ref: '../components.yaml#/components/responses/InternalServerError'

  put:
    tags:
      - SeasonManagement
    operationId: updateSeasonById
    summary: Update season by Id
    description: Update a season's details by its unique identifier
    parameters:
      - $ref: '#/components/parameters/season-id'
    requestBody:
      content:
        application/json:
          schema:
            $ref: '../components.yaml#/components/schemas/SeasonUpdateRequest'
    responses:
      '200':
        description: Season details updated successfully
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/SeasonResponse'
      '400':
        $ref: '../components.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '500':
        $ref: '../components.yaml#/components/responses/InternalServerError'

  delete:
    tags:
      - SeasonManagement
    operationId: deleteSeasonById
    summary: Delete season by Id
    description: Delete a season by its unique identifier
    parameters:
      - $ref: '#/components/parameters/season-id'
    responses:
      '200':
        description: Season deleted successfully
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/SeasonResponse'
      '400':
        $ref: '../components.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '500':
        $ref: '../components.yaml#/components/responses/InternalServerError'

components:
  parameters:
    season-id:
      name: season-id
      in: path
      required: true
      schema:
        type: integer
        format: int64