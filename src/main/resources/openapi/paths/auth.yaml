signup:
  post:
    summary: User Registration
    description: Register a new user account
    tags:
      - Auth
    operationId: signup
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components.yaml#/components/schemas/SignupRequest'
    responses:
      '201':
        description: User successfully registered
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/UserDto'
      '400':
        $ref: '../components.yaml#/components/responses/BadRequest'
      '500':
        $ref: '../components.yaml#/components/responses/InternalServerError'

login:
  post:
    summary: User Login
    description: Authenticate user and return JWT token
    tags:
      - Auth
    operationId: login
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components.yaml#/components/schemas/LoginRequest'
    responses:
      '200':
        description: Login successful
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/LoginResponse'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '500':
        $ref: '../components.yaml#/components/responses/InternalServerError'
