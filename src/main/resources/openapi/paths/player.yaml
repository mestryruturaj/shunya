player:
  post:
    description: Create a new player
    summary: Create Player
    tags:
      - Player
    security:
      - bearerAuth: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components.yaml#/components/schemas/PlayerCreateRequest'

    responses:
      '201':
        description: Player created successfully
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/PlayerDto'
      '400':
        $ref: '../components.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '500':
        $ref: '../components.yaml#/components/responses/InternalServerError'

  get:
    description: Get all players
    summary: Get Players
    tags:
      - Player
    security:
      - bearerAuth: [ ]
    responses:
      '200':
        description: List of players retrieved successfully
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components.yaml#/components/schemas/PlayerDto'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '500':
        $ref: '../components.yaml#/components/responses/InternalServerError'

  put:
    description: Update an existing player
    summary: Update Player
    tags:
      - Player
    security:
      - bearerAuth: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components.yaml#/components/schemas/PlayerUpdateRequest'

    responses:
      '200':
        description: Player updated successfully
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/PlayerDto'
      '400':
        $ref: '../components.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '500':
        $ref: '../components.yaml#/components/responses/InternalServerError'
  
  
playerById:
  get:
    description: Retrieve a specific player by their unique identifier
    summary: Get Player By ID
    tags:
      - Player
    security:
      - bearerAuth: [ ]
    parameters:
      - name: playerId
        in: path
        description: Unique identifier of the player (must be a positive integer)
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
          example: 123
    responses:
      '200':
        description: Player retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/PlayerDto'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '404':
        description: Player not found with the provided ID
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/ErrorDto'
      '500':
        $ref: '../components.yaml#/components/responses/InternalServerError'

  delete:
    description: Delete a specific player by their unique identifier
    summary: Delete Player By ID
    tags:
      - Player
    security:
      - bearerAuth: [ ]
    parameters:
      - name: playerId
        in: path
        description: Unique identifier of the player to delete (must be a positive integer)
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
          example: 123
    responses:
      '204':
        description: Player deleted successfully (no content returned)
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '404':
        description: Player not found with the provided ID
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/ErrorDto'
      '500':
        $ref: '../components.yaml#/components/responses/InternalServerError'
