tournament:
  post:
    tags:
      - Tournament
    operationId: createTournament
    summary: Create a new tournament
    description: >
      Endpoint to create a new tournament with specified details.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components.yaml#/components/schemas/TournamentCreateRequest'
    responses:
      '201':
        description: Tournament created successfully
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/TournamentResponse'
      '400':
        $ref: '../components.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '500':
        $ref: '../components.yaml#/components/responses/InternalServerError'

tournamentById:
  get:
    tags:
      - Tournament
    operationId: getTournamentById
    summary: Get tournament details by ID
    description: >
      Retrieve detailed information about a specific tournament using its unique identifier.
    parameters:
      - $ref: '../components.yaml#/parameters/tournamentId'
    responses:
      '200':
        description: Tournament details retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/TournamentResponse'
      '400':
        $ref: '../components.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '500':
        $ref: '../components.yaml#/components/responses/InternalServerError'
  put:
    tags:
      - Tournament
    operationId: updateTournamentById
    summary: Update tournament details by ID
    description: >
      Update the details of an existing tournament using its unique identifier.
    parameters:
      - $ref: '../components.yaml#/parameters/tournamentId'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components.yaml#/components/schemas/TournamentUpdateRequest'
    responses:
      '200':
        description: Tournament updated successfully
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/TournamentResponse'
      '400':
        $ref: '../components.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '500':
        $ref: '../components.yaml#/components/responses/InternalServerError'