components:
  securitySchemes:
    bearerAuth: # For JWT Integration
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDto'

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDto'

    InternalServerError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDto'

  schemas:
    UserDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        mobileNumber:
          type: string
          pattern: "[1-9][0-9]{9}"

    ErrorDto:
      type: object
      properties:
        statusCode:
          type: integer
          description: HTTP status code
          example: 400
        message:
          type: string
          description: Error message describing what went wrong
          example: Invalid input provided
        errorCode:
          type: string
          description: Application-specific error code for programmatic handling
          example: INVALID_REQUEST
      required:
        - statusCode
        - message
        - errorCode

    SignupRequest:
      description: User registration details for creating a new account
      type: object
      properties:
        name:
          description: Full name of the user
          type: string
          example: "John Doe"
        email:
          description: User email address for account creation
          type: string
          format: email
          example: "username@domain.com"
        mobileNumber:
          description: User mobile number for account creation
          type: string
          pattern: "[1-9][0-9]{9}"
          example: "9876543210"
        password:
          description: Password for the new account
          type: string
          format: password
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,20}$'
          example: "password@123"

    LoginRequest:
      type: object
      description: Login credentials for user authentication
      properties:
        email:
          description: User email address used for login
          type: string
          format: email
          example: "username@domain.com"
        mobileNumber:
          description: User mobile number used for login (alternative to email)
          type: string
          pattern: "[1-9][0-9]{9}"
          example: "9876543210"
        password:
          description: User password for authentication
          type: string
          format: password
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,20}$'
          example: "password123"
      required:
        - password
      oneOf:
        - required: [ email ]
        - required: [ mobileNumber ]

    LoginResponse:
      description: Response object for successful login containing JWT token and user details
      type: object
      properties:
        token:
          description: JWT token for authenticated sessions
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        user:
          description: Authenticated user details
          $ref: '#/components/schemas/UserDto'
        message:
          description: Optional message providing additional information about the login response
          type: string
          example: "Login successful"

    PlayerDto:
      description: Complete player profile extending user with cricket-specific attributes
      type: object
      properties:
        # User inherited properties
        id:
          type: integer
          format: int64
          description: Unique identifier for the player
          example: 101
        name:
          type: string
          description: Full name of the player
          example: "Virat Kohli"
        role:
          type: string
          enum:
            - ORGANIZER
            - PLAYER
          description: Role of the user in the system
          example: "PLAYER"

        # Cricket-specific properties
        strengths:
          type: array
          items:
            type: string
            enum:
              - BATTER
              - BOWLER
              - WICKET_KEEPER
          description: Player's cricket strengths/roles
          example: [ "BATTER", "WICKET_KEEPER" ]
        battingStyle:
          type: string
          enum:
            - RIGHT_HANDED
            - LEFT_HANDED
          description: Batting hand orientation of the player
          example: "RIGHT_HANDED"
        bowlingStyle:
          type: string
          enum:
            - RIGHT_ARM_FAST
            - RIGHT_ARM_MEDIUM
            - RIGHT_ARM_SLOW
            - LEFT_ARM_FAST
            - LEFT_ARM_MEDIUM
            - LEFT_ARM_SLOW
            - OFF_BREAK
            - LEG_BREAK
            - CHINAMAN
            - NOT_APPLICABLE
          description: Bowling style (Not applicable for BATTER and WICKET_KEEPER)
          example: "RIGHT_ARM_FAST"
        skillLevel:
          type: string
          enum:
            - BEGINNER
            - INTERMEDIATE
            - ADVANCED
            - EXPERT
          description: Overall skill level of the player
          example: "EXPERT"
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
            - BANNED
            - SUSPENDED
          description: Current status of the player account
          example: "ACTIVE"
        mobileNumber:
          type: string
          pattern: "[1-9][0-9]{9}"
          description: Player's mobile number (10 digits)
          example: "9876543210"
        country:
          type: string
          description: Player's country
          example: "India"
        createdAt:
          type: string
          format: date-time
          description: Timestamp when player account was created
          example: "2025-01-15T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when player profile was last updated
          example: "2026-03-29T15:45:00Z"
      required:
        - id
        - name
        - email
        - role
        - strengths
        - battingStyle
        - skillLevel
        - status
        - createdAt

    PlayerCreateRequest:
      description: Request payload for creating a new player
      type: object
      properties:
        userId:
          type: integer
          format: int64
          description: Unique identifier of the user associated with the player profile
          example: 101
        email:
          type: string
          format: email
          description: Email address of the player (must be unique)
          example: "email_id@domain.com"
        mobileNumber:
          type: string
          pattern: "[1-9][0-9]{9}"
          description: Mobile number of the player (10 digits)
          example: "9876543210"
        name:
          type: string
          description: Full name of the player
          example: "Rohit Sharma"
        canBat:
          type: boolean
          description: Indicates if the player can bat
          example: true
        canBowl:
          type: boolean
          description: Indicates if the player can bowl
          example: false
        canKeepWickets:
          type: boolean
          description: Indicates if the player can keep wickets
          example: true
        battingStyle:
          type: string
          enum:
            - RIGHT_HANDED
            - LEFT_HANDED
          description: Batting hand orientation
          example: "RIGHT_HANDED"
        bowlingStyle:
          type: string
          enum:
            - RIGHT_ARM_FAST
            - RIGHT_ARM_MEDIUM
            - RIGHT_ARM_SLOW
            - LEFT_ARM_FAST
            - LEFT_ARM_MEDIUM
            - LEFT_ARM_SLOW
            - OFF_BREAK
            - LEG_BREAK
            - CHINAMAN
            - NOT_APPLICABLE
          description: Bowling style (optional for non-bowlers)
          example: "NOT_APPLICABLE"
        country:
          type: string
          description: Player's country
          example: "India"
        skillLevel:
          type: string
          enum:
            - BEGINNER
            - INTERMEDIATE
            - ADVANCED
            - EXPERT
          description: Player's initial skill level
          example: "INTERMEDIATE"
        profileImageUrl:
          type: string
          format: uri
          description: URL to player's profile image
          example: "https://example.com/images/players/101.jpg"
      required:
        - name
        - strengths
        - battingStyle
        - skillLevel

    PlayerUpdateRequest:
      description: Request payload for updating player information
      type: object
      properties:
        name:
          type: string
          description: Full name of the player
          example: "Rohit Sharma"
        profileImageUrl:
          type: string
          format: uri
          description: URL to player's profile image
          example: "https://example.com/images/players/101.jpg"
        country:
          type: string
          description: Player's country
          example: "India"
        strengths:
          type: array
          items:
            type: string
            enum:
              - BATTER
              - BOWLER
              - WICKET_KEEPER
          description: Player's cricket strengths/roles
          example: [ "BATTER", "WICKET_KEEPER" ]
        battingStyle:
          type: string
          enum:
            - RIGHT_HANDED
            - LEFT_HANDED
          description: Batting hand orientation
          example: "RIGHT_HANDED"
        bowlingStyle:
          type: string
          enum:
            - RIGHT_ARM_FAST
            - RIGHT_ARM_MEDIUM
            - RIGHT_ARM_SLOW
            - LEFT_ARM_FAST
            - LEFT_ARM_MEDIUM
            - LEFT_ARM_SLOW
            - OFF_BREAK
            - LEG_BREAK
            - CHINAMAN
            - NOT_APPLICABLE
          description: Bowling style (optional for non-bowlers)
          example: "RIGHT_ARM_FAST"
        skillLevel:
          type: string
          enum:
            - BEGINNER
            - INTERMEDIATE
            - ADVANCED
            - EXPERT
          description: Updated skill level of the player
          example: "ADVANCED"
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
            - BANNED
            - SUSPENDED
          description: Updated status of the player account
          example: "ACTIVE"
