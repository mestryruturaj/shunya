components:
  securitySchemes:
    bearerAuth: # For JWT Integration
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDto'

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDto'

    InternalServerError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDto'

  schemas:
    UserDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        mobileNumber:
          type: string
          pattern: "[1-9][0-9]{9}"

    ErrorDto:
      type: object
      properties:
        statusCode:
          type: integer
          description: HTTP status code
          example: 400
        message:
          type: string
          description: Error message describing what went wrong
          example: Invalid input provided
        errorCode:
          type: string
          description: Application-specific error code for programmatic handling
          example: INVALID_REQUEST
      required:
        - statusCode
        - message
        - errorCode

    SignupRequest:
      description: User registration details for creating a new account
      type: object
      properties:
        name:
          description: Full name of the user
          type: string
          example: "John Doe"
        email:
          description: User email address for account creation
          type: string
          format: email
          example: "username@domain.com"
        mobileNumber:
          description: User mobile number for account creation
          type: string
          pattern: "[1-9][0-9]{9}"
          example: "9876543210"
        password:
          description: Password for the new account
          type: string
          format: password
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,20}$'
          example: "password@123"

    LoginRequest:
      type: object
      description: Login credentials for user authentication
      properties:
        email:
          description: User email address used for login
          type: string
          format: email
          nullable: true
          example: "username@domain.com"
        mobileNumber:
          description: User mobile number used for login (alternative to email)
          type: string
          pattern: "[1-9][0-9]{9}"
          nullable: true
          example: "9876543210"
        password:
          description: User password for authentication
          type: string
          format: password
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,20}$'
          nullable: false
          example: "password123"
      required:
        - password
      oneOf:
        - required: [ email ]
        - required: [ mobileNumber ]

    LoginResponse:
      description: Response object for successful login containing JWT token and user details
      type: object
      properties:
        token:
          description: JWT token for authenticated sessions
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        user:
          description: Authenticated user details
          $ref: '#/components/schemas/UserDto'
        message:
          description: Optional message providing additional information about the login response
          type: string
          example: "Login successful"


